<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>U — music</title>
  <meta name="description" content="U — dark electronic / industrial music">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080808;
      --surface:  #111111;
      --border:   #222222;
      --text:     #c8c8c0;
      --muted:    #505048;
      --accent:   #e8e0c0;
      --red:      #c03020;
      --scan-opacity: 0.03;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* scanlines overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,var(--scan-opacity)) 2px,
        rgba(0,0,0,var(--scan-opacity)) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* noise grain */
    body::after {
      content: '';
      position: fixed;
      inset: -200%;
      width: 400%;
      height: 400%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 99;
      opacity: 0.4;
      animation: grain 0.5s steps(1) infinite;
    }

    @keyframes grain {
      0%   { transform: translate(0,0); }
      10%  { transform: translate(-2%,-3%); }
      20%  { transform: translate(3%, 1%); }
      30%  { transform: translate(-1%, 4%); }
      40%  { transform: translate(4%,-1%); }
      50%  { transform: translate(-3%, 2%); }
      60%  { transform: translate(2%, 3%); }
      70%  { transform: translate(-4%, 0%); }
      80%  { transform: translate(1%,-4%); }
      90%  { transform: translate(3%, 3%); }
      100% { transform: translate(-2%,-1%); }
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    /* ── LOGO ── */
    .logo-wrap {
      margin-bottom: 2.5rem;
      text-align: center;
      position: relative;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(7rem, 22vw, 11rem);
      line-height: 0.85;
      letter-spacing: -0.02em;
      color: var(--accent);
      position: relative;
      display: inline-block;
      user-select: none;
    }

    /* glitch layers */
    .logo::before,
    .logo::after {
      content: 'U';
      position: absolute;
      inset: 0;
      color: var(--accent);
    }
    .logo::before {
      animation: glitch-r 4s infinite steps(1);
      clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
      color: var(--red);
      opacity: 0;
    }
    .logo::after {
      animation: glitch-b 4s infinite steps(1) 0.1s;
      clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%);
      color: #2060b0;
      opacity: 0;
      mix-blend-mode: screen;
    }

    @keyframes glitch-r {
      0%,89%,100% { opacity: 0; transform: none; }
      90%  { opacity: 1; transform: translateX(-3px); }
      92%  { opacity: 1; transform: translateX(2px); }
      94%  { opacity: 0; }
      96%  { opacity: 1; transform: translateX(-1px); }
      98%  { opacity: 0; }
    }
    @keyframes glitch-b {
      0%,89%,100% { opacity: 0; transform: none; }
      90%  { opacity: 1; transform: translateX(3px); }
      92%  { opacity: 1; transform: translateX(-2px); }
      94%  { opacity: 0; }
      96%  { opacity: 1; transform: translateX(1px); }
      98%  { opacity: 0; }
    }

    .tagline {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--muted);
    }

    /* ── LINKS ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1px solid var(--border);
      background: var(--surface);
      text-decoration: none;
      color: var(--text);
      position: relative;
      overflow: hidden;
      transition: border-color 0.15s, color 0.15s;
      cursor: pointer;
    }

    .link-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: translateX(-100%);
      transition: transform 0.2s cubic-bezier(0.4,0,0.2,1);
      z-index: 0;
    }

    .link-item:hover::before { transform: translateX(0); }
    .link-item:hover { color: var(--bg); border-color: var(--accent); }
    .link-item:hover .link-label { color: var(--bg); }
    .link-item:hover .link-cmd  { color: var(--bg); opacity: 0.5; }

    .link-gutter {
      width: 40px;
      min-width: 40px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--border);
      font-size: 0.65rem;
      color: var(--muted);
      font-family: 'Share Tech Mono', monospace;
      position: relative;
      z-index: 1;
      transition: color 0.15s, border-color 0.15s;
    }

    .link-item:hover .link-gutter {
      color: var(--bg);
      border-right-color: rgba(0,0,0,0.15);
    }

    .link-body {
      flex: 1;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .link-cmd {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      font-family: 'Share Tech Mono', monospace;
      transition: color 0.15s;
    }

    .link-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: var(--accent);
      transition: color 0.15s;
    }

    .link-arrow {
      padding: 0 16px;
      font-size: 0.8rem;
      color: var(--muted);
      position: relative;
      z-index: 1;
      transition: color 0.15s;
    }
    .link-item:hover .link-arrow { color: var(--bg); }

    /* ── FOOTER ── */
    .footer {
      margin-top: 3rem;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-align: center;
      line-height: 2;
    }

    /* entrance animation */
    .container { animation: fadein 1.2s ease both; }
    @keyframes fadein {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .link-item {
      animation: slidein 0.6s ease both;
    }
    .link-item:nth-child(1) { animation-delay: 0.3s; }
    .link-item:nth-child(2) { animation-delay: 0.4s; }
    .link-item:nth-child(3) { animation-delay: 0.5s; }
    .link-item:nth-child(4) { animation-delay: 0.6s; }
    .link-item:nth-child(5) { animation-delay: 0.7s; }
    .link-item:nth-child(6) { animation-delay: 0.8s; }

    @keyframes slidein {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="logo-wrap">

    </div>
