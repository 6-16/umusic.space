    <style>
        /* ── MUSIC PAGE SPECIFIC ── */
        .music-section {
            width: 100%;
            margin-bottom: 3rem;
        }

        .music-section:last-child {
            margin-bottom: 0;
        }

        /* Spotify tracks grid */
        .tracks-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .track-wrap {
            position: relative;
            border: 1px solid var(--border);
            background: rgba(8,12,16,0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            overflow: hidden;
            transition: border-color 0.2s;
            animation: slidein 0.5s ease both;
        }

        .track-wrap:hover {
            border-color: var(--accent);
        }

        .track-wrap:nth-child(1) { animation-delay: 0.1s; }
        .track-wrap:nth-child(2) { animation-delay: 0.2s; }
        .track-wrap:nth-child(3) { animation-delay: 0.3s; }
        .track-wrap:nth-child(4) { animation-delay: 0.4s; }
        .track-wrap:nth-child(5) { animation-delay: 0.5s; }

        .track-wrap iframe {
            display: block;
            width: 100%;
            border: none;
            border-radius: 0;
        }

        /* track label above each embed */
        .track-index {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px 8px;
            border-bottom: 1px solid var(--border);
        }

        .track-index span:first-child {
            font-size: 0.58rem;
            color: var(--muted);
            letter-spacing: 0.2em;
            min-width: 24px;
        }

        .track-index span:last-child {
            font-size: 0.58rem;
            color: var(--accent);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        /* SoundCloud section */
        .sc-wrap {
            border: 1px solid var(--border);
            background: rgba(8,12,16,0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            overflow: hidden;
            transition: border-color 0.2s;
            animation: fadein 0.8s ease both;
            animation-delay: 0.3s;
        }

        .sc-wrap:hover {
            border-color: var(--accent);
        }

        .sc-note {
            padding: 12px 16px;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
        }

        .sc-note span {
            color: var(--accent);
        }

        .sc-wrap iframe {
            display: block;
            width: 100%;
            border: none;
        }
    </style>
</head>
